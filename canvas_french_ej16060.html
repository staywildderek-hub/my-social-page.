<!DOCTYPE html>
<html>
<head>
    <title>My Social Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">my-social-hub</div>
        <input type="text" placeholder="Search profiles...">
    </nav>

    <div class="container">
        <h1>Featured Profiles</h1>
        <div class="grid">
            <!-- These are like the game tiles on your friend's site -->
            <div class="card">
                <div class="image-placeholder"></div>
                <div class="info">My Profile</div>
            </div>
            <div class="card">
                <div class="image-placeholder"></div>
                <div class="info">Top Friends</div>
            </div>
            <div class="card">
                <div class="image-placeholder"></div>
                <div class="info">Messages</div>
            </div>
        </div>
    </div>
</body>
</html>
